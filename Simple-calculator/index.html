<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calc</title>
</head>
<body>
    
  <div class="calculator" id="calculator">
    <button id="themeToggle">Toggle Theme</button>
    <input type="text" id="display" readonly>
    <div id="history"></div>
    <div class="buttons">
      <button class="btn btn-clear" id="clear">C</button>
      <button class="btn" id="backspace">⌫</button>
      <button class="btn btn-operator" id="divide">/</button>
      <button class="btn btn-operator" id="multiply">*</button>

      <button class="btn" id="seven">7</button>
      <button class="btn" id="eight">8</button>
      <button class="btn" id="nine">9</button>
      <button class="btn btn-operator" id="subtract">-</button>

      <button class="btn" id="four">4</button>
      <button class="btn" id="five">5</button>
      <button class="btn" id="six">6</button>
      <button class="btn btn-operator" id="add">+</button>

      <button class="btn" id="one">1</button>
      <button class="btn" id="two">2</button>
      <button class="btn" id="three">3</button>
      <button class="btn btn-equal" id="equal">=</button>

      <button class="btn" id="zero">0</button>
      <button class="btn" id="decimal">.</button>
      <button class="btn" id="negate">±</button>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
